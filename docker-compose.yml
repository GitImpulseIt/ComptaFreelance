services:
  # === APP PRINCIPALE (freelance) ===
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: comptav2-php
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-comptav2}
      - POSTGRES_USER=${POSTGRES_USER:-comptav2}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - OLLAMA_URL=${OLLAMA_URL:-https://ollama.kazflow.com}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.6}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - OLLAMA_CF_CLIENT_ID=${OLLAMA_CF_CLIENT_ID:-}
      - OLLAMA_CF_CLIENT_SECRET=${OLLAMA_CF_CLIENT_SECRET:-}
    networks:
      - comptav2-network

  nginx:
    image: nginx:alpine
    container_name: comptav2-nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - comptav2-network

  # === WEBAPP ADMIN ===
  admin-php:
    build:
      context: ./admin/docker/php
      dockerfile: Dockerfile
    container_name: comptav2-admin-php
    volumes:
      - ./admin:/var/www/html
      - ./admin/storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-comptav2}
      - POSTGRES_USER=${POSTGRES_USER:-comptav2}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    networks:
      - comptav2-network

  admin-nginx:
    image: nginx:alpine
    container_name: comptav2-admin-nginx
    ports:
      - "${ADMIN_PORT:-8081}:80"
    volumes:
      - ./admin:/var/www/html
      - ./admin/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - admin-php
    networks:
      - comptav2-network

  # === BASE DE DONNÉES (partagée) ===
  postgres:
    image: postgres:16-alpine
    container_name: comptav2-postgres
    ports:
      - "${POSTGRES_PORT_EXTERNAL:-5432}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-comptav2}
      - POSTGRES_USER=${POSTGRES_USER:-comptav2}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-comptav2}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - comptav2-network

volumes:
  postgres_data:

networks:
  comptav2-network:
    driver: bridge
